name: Cache Controller Verification (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-cache:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install GHDL
      run: |
        sudo apt-get update
        sudo apt-get install -y ghdl

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Grant execution permissions
      run: chmod +x ejecutar_proyecto2.sh

    - name: Run All Tests (CI Mode)
      run: python3 scripts/run_tests.py --all
      env:
        PYTHONIOENCODING: utf-8
